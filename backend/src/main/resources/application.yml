server:
  port: 8080

spring:
  datasource:
    # Use file-based H2 so data persists between restarts
    url: jdbc:h2:file:./data/aimentor;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: replace-this-secret-with-a-secure-value
  expiration-ms: 86400000
